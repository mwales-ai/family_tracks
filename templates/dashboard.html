{% extends "base.html" %}
{% block title %}Map - Family Tracks{% endblock %}

{% block content %}
<div class="map-container {% if request.args.get('mobile') %}mobile-fullscreen{% endif %}">
    <div id="map"></div>
    {% if not request.args.get('mobile') %}
    <div class="map-sidebar">
        <h3>Family Members</h3>
        <div id="memberList"></div>
        <hr>
        <h3>History</h3>
        <div class="history-controls">
            <label for="historyUser">User:</label>
            <select id="historyUser"></select>
            <label for="historyStart">From:</label>
            <input type="date" id="historyStart">
            <label for="historyEnd">To:</label>
            <input type="date" id="historyEnd">
            <label class="precise-toggle">
                <input type="checkbox" id="preciseTime"> Precise time
            </label>
            <button id="showHistory" class="btn btn-primary">Show Track</button>
            <button id="clearHistory" class="btn">Clear</button>
            <button id="exportGpx" class="btn">Export GPX</button>
        </div>
    </div>
    {% endif %}
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize map centered on US (user can pan to their area)
    var map = L.map('map').setView([39.8283, -98.5795], 4);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    var markers = {};
    var historyLine = null;

    // Color palette for different users
    var colors = ['#e74c3c', '#3498db', '#2ecc71', '#9b59b6', '#f39c12',
                  '#1abc9c', '#e67e22', '#e91e63'];

    function getColor(index) {
        return colors[index % colors.length];
    }

    function formatSpeed(mps) {
        if (mps === null || mps === undefined) return null;
        if (window.USER_UNITS === 'imperial') {
            return (mps * 2.23694).toFixed(1) + ' mph';
        }
        return (mps * 3.6).toFixed(1) + ' km/h';
    }

    function formatTime(timestamp) {
        if (!timestamp) return "Unknown";
        var d = new Date(timestamp);
        var opts = {};
        if (window.USER_TIMEZONE) opts.timeZone = window.USER_TIMEZONE;
        return d.toLocaleString(undefined, opts);
    }

    var isMobile = window.location.search.indexOf('mobile=1') !== -1;

    // Spread out markers that are very close together so avatars don't overlap.
    // Returns adjusted [{lat, lon, origIdx}] array.
    function spreadOverlapping(data) {
        var CLOSE_METERS = 50;  // treat as "same place" if within 50m
        var OFFSET_DEG = 0.0003; // ~33m offset for spread

        var result = [];
        for (var i = 0; i < data.length; i++) {
            result.push({lat: data[i].latitude, lon: data[i].longitude});
        }

        // Group indices by proximity
        var visited = {};
        for (var i = 0; i < data.length; i++) {
            if (visited[i]) continue;
            var group = [i];
            for (var j = i + 1; j < data.length; j++) {
                if (visited[j]) continue;
                var dLat = data[i].latitude - data[j].latitude;
                var dLon = data[i].longitude - data[j].longitude;
                // Quick approximate distance check (~111km per degree)
                var approxM = Math.sqrt(dLat * dLat + dLon * dLon) * 111000;
                if (approxM < CLOSE_METERS) {
                    group.push(j);
                    visited[j] = true;
                }
            }
            if (group.length > 1) {
                var cx = data[i].latitude;
                var cy = data[i].longitude;
                for (var k = 0; k < group.length; k++) {
                    var angle = (2 * Math.PI * k) / group.length;
                    result[group[k]].lat = cx + OFFSET_DEG * Math.cos(angle);
                    result[group[k]].lon = cy + OFFSET_DEG * Math.sin(angle);
                }
            }
        }
        return result;
    }

    function refreshLocations() {
        fetch('/api/locations/latest')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var memberList = document.getElementById('memberList');
                var historyUser = document.getElementById('historyUser');
                if (memberList) memberList.innerHTML = '';
                if (historyUser) historyUser.innerHTML = '';

                var adjusted = spreadOverlapping(data);

                data.forEach(function(loc, i) {
                    var color = getColor(i);
                    var displayLat = adjusted[i].lat;
                    var displayLon = adjusted[i].lon;

                    // Update or create marker
                    if (markers[loc.userId]) {
                        markers[loc.userId].setLatLng([displayLat, displayLon]);
                    } else {
                        var markerHtml;
                        if (loc.avatarPath) {
                            markerHtml = '<img src="/avatar/' + loc.avatarPath + '" class="marker-avatar">';
                        } else {
                            markerHtml = '<div style="background:' + color + '">' +
                                  loc.displayName.charAt(0).toUpperCase() + '</div>';
                        }
                        var icon = L.divIcon({
                            className: 'user-marker',
                            html: markerHtml,
                            iconSize: [36, 36],
                            iconAnchor: [18, 18]
                        });
                        markers[loc.userId] = L.marker([displayLat, displayLon],
                            {icon: icon}).addTo(map);
                    }

                    var popupHtml = '<b>' + loc.displayName + '</b><br>' +
                        'Updated: ' + formatTime(loc.timestamp);
                    if (loc.speed !== null) popupHtml += '<br>Speed: ' + formatSpeed(loc.speed);
                    if (loc.battery !== null) popupHtml += '<br>Battery: ' + Math.round(loc.battery) + '%';
                    markers[loc.userId].bindPopup(popupHtml);

                    if (memberList) {
                        var div = document.createElement('div');
                        div.className = 'member-entry';
                        div.innerHTML = '<span class="member-dot" style="background:' + color + '"></span>' +
                            '<span class="member-name">' + loc.displayName + '</span>' +
                            '<span class="member-time">' + formatTime(loc.timestamp) + '</span>';
                        div.onclick = function() {
                            map.setView([loc.latitude, loc.longitude], 15);
                            markers[loc.userId].openPopup();
                        };
                        memberList.appendChild(div);
                    }

                    if (historyUser) {
                        var opt = document.createElement('option');
                        opt.value = loc.userId;
                        opt.text = loc.displayName;
                        historyUser.appendChild(opt);
                    }
                });

                if (data.length > 0 && !map._userPanned) {
                    var group = L.featureGroup(Object.values(markers));
                    map.fitBounds(group.getBounds().pad(0.1));
                    map._userPanned = true;
                }
            });
    }

    if (!isMobile) {
        // Set default date range to last 24 hours
        var now = new Date();
        var yesterday = new Date(now.getTime() - 24 * 60 * 60 * 1000);
        document.getElementById('historyEnd').value = now.toISOString().slice(0, 10);
        document.getElementById('historyStart').value = yesterday.toISOString().slice(0, 10);

        // Toggle between date-only and precise datetime inputs
        document.getElementById('preciseTime').onchange = function() {
            var startEl = document.getElementById('historyStart');
            var endEl = document.getElementById('historyEnd');
            var startVal = startEl.value;
            var endVal = endEl.value;

            if (this.checked) {
                startEl.type = 'datetime-local';
                endEl.type = 'datetime-local';
                // Preserve date, add time
                if (startVal && startVal.length === 10) startEl.value = startVal + 'T00:00';
                if (endVal && endVal.length === 10) endEl.value = endVal + 'T23:59';
            } else {
                startEl.type = 'date';
                endEl.type = 'date';
                // Strip time portion
                if (startVal) startEl.value = startVal.slice(0, 10);
                if (endVal) endEl.value = endVal.slice(0, 10);
            }
        };

        document.getElementById('showHistory').onclick = function() {
            var userId = document.getElementById('historyUser').value;
            var start = document.getElementById('historyStart').value;
            var end = document.getElementById('historyEnd').value;

            // For date-only inputs, use start of day and end of day
            if (start && start.length === 10) start = start + 'T00:00';
            if (end && end.length === 10) end = end + 'T23:59';

            if (!userId) return;

            var url = '/api/locations/history?userId=' + userId;
            if (start) url += '&start=' + encodeURIComponent(start);
            if (end) url += '&end=' + encodeURIComponent(end);

            fetch(url)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (historyLine) {
                        map.removeLayer(historyLine);
                    }

                    if (data.length === 0) {
                        alert('No location data found for this time range.');
                        return;
                    }

                    // Color segments by speed: blue (slow) -> green -> yellow -> red (fast)
                    var maxSpd = 0;
                    data.forEach(function(p) {
                        if (p.speed !== null && p.speed > maxSpd) maxSpd = p.speed;
                    });
                    if (maxSpd < 1) maxSpd = 1;

                    var segments = [];
                    for (var j = 1; j < data.length; j++) {
                        var spd = data[j].speed || 0;
                        var ratio = Math.min(spd / maxSpd, 1);
                        var segColor;
                        if (ratio < 0.33) segColor = '#3498db';
                        else if (ratio < 0.66) segColor = '#2ecc71';
                        else segColor = '#e74c3c';

                        var seg = L.polyline([
                            [data[j-1].latitude, data[j-1].longitude],
                            [data[j].latitude, data[j].longitude]
                        ], {color: segColor, weight: 4, opacity: 0.8});
                        segments.push(seg);
                    }

                    historyLine = L.layerGroup(segments).addTo(map);

                    if (!legendVisible) {
                        legendControl.addTo(map);
                        legendVisible = true;
                    }

                    var allPoints = data.map(function(p) { return [p.latitude, p.longitude]; });
                    map.fitBounds(L.latLngBounds(allPoints).pad(0.1));
                });
        };

        document.getElementById('clearHistory').onclick = function() {
            if (historyLine) {
                map.removeLayer(historyLine);
                historyLine = null;
            }
            if (legendVisible) {
                legendControl.remove();
                legendVisible = false;
            }
        };

        document.getElementById('exportGpx').onclick = function() {
            var userId = document.getElementById('historyUser').value;
            var start = document.getElementById('historyStart').value;
            var end = document.getElementById('historyEnd').value;
            if (!userId) return;
            var url = '/api/locations/export?userId=' + userId;
            if (start) url += '&start=' + encodeURIComponent(start);
            if (end) url += '&end=' + encodeURIComponent(end);
            window.location.href = url;
        };
    }

    // Load geofences
    var geofenceCircles = [];
    fetch('/api/geofences')
        .then(function(r) { return r.json(); })
        .then(function(fences) {
            fences.forEach(function(f) {
                var circle = L.circle([f.latitude, f.longitude], {
                    radius: f.radiusMeters,
                    color: '#9b59b6',
                    fillColor: '#9b59b6',
                    fillOpacity: 0.1,
                    weight: 2,
                    dashArray: '5, 5'
                }).addTo(map);
                circle.bindTooltip(f.name, {permanent: true, direction: 'center', className: 'geofence-label'});
                geofenceCircles.push(circle);
            });
        });

    // Speed legend (shown when track history is visible)
    var legendControl = L.control({position: 'bottomright'});
    legendControl.onAdd = function() {
        var div = L.DomUtil.create('div', 'speed-legend');
        div.innerHTML =
            '<b>Track Speed</b><br>' +
            '<span style="background:#3498db"></span> Slow<br>' +
            '<span style="background:#2ecc71"></span> Medium<br>' +
            '<span style="background:#e74c3c"></span> Fast';
        return div;
    };
    var legendVisible = false;

    // Refresh locations every 30 seconds
    refreshLocations();
    setInterval(refreshLocations, 30000);
</script>
{% endblock %}
